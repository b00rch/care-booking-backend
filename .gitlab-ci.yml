image: docker:24

services:
  - name: docker:24-dind
    command: ["--tls=false"]

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

stages:
  - build

build_strapi_image:
  stage: build
  rules:
    - if: "$CI_COMMIT_BRANCH == 'main'"
  before_script:
    - apk add --no-cache docker-cli-buildx
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx create --use --name strapi-builder || docker buildx use strapi-builder
    - docker buildx inspect --bootstrap
  script:
    - |
      docker buildx build \
        --push \
        --tag "$CI_REGISTRY_IMAGE:latest" \
        --tag "$CI_REGISTRY_IMAGE:${CI_COMMIT_SHORT_SHA}" \
        --file Dockerfile \
        .
